<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenRepo Mentor</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: rgba(255, 255, 255, 0.82);
      --text: #1f2933;
      --muted: #52606d;
      --accent: #a23e2a;
      --accent-soft: #f6d8b8;
      --border: rgba(82, 96, 109, 0.18);
      --shadow: 0 24px 60px rgba(31, 41, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #f8e7cf 0, transparent 32%),
        linear-gradient(180deg, #efe5d6 0%, var(--bg) 42%, #f7f4ef 100%);
      line-height: 1.7;
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .hero {
      margin-bottom: 24px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.05;
    }

    .hero p {
      margin: 12px 0 0;
      max-width: 720px;
      color: var(--muted);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 24px 0;
    }

    nav a {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.68);
    }

    nav a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    article {
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
    }

    h1, h2, h3 {
      line-height: 1.2;
      color: #18202a;
    }

    h2, h3 {
      margin-top: 1.8em;
    }

    p, li {
      color: var(--text);
    }

    a {
      color: var(--accent);
    }

    pre {
      overflow-x: auto;
      padding: 16px;
      border-radius: 16px;
      background: #1f2933;
      color: #f8fafc;
    }

    code {
      font-family: "SFMono-Regular", "JetBrains Mono", Consolas, monospace;
    }

    :not(pre) > code {
      padding: 0.16rem 0.4rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #7c2d12;
    }

    blockquote {
      margin: 20px 0;
      padding: 8px 18px;
      border-left: 4px solid var(--accent);
      color: var(--muted);
      background: rgba(246, 216, 184, 0.28);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 640px) {
      .shell {
        padding: 20px 14px 40px;
      }

      .hero,
      article {
        padding: 20px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <p class="eyebrow">Open Source Practice Toolkit</p>
      <h1>OpenRepo Mentor</h1>
      <p>面向开源课程实践的小组协作工具站点，集中展示项目说明、使用文档、Demo 输出和课程报告。</p>
      <nav>
        <a href="index.html">首页</a>
        <a href="guide.html">使用指南</a>
        <a href="demo.html">Demo 展示</a>
        <a href="report.html">实践报告</a>
      </nav>
    </header>
    <article id="content"></article>
    <footer>Generated for the OpenRepo Mentor course project.</footer>
  </div>
</body>
</html>
